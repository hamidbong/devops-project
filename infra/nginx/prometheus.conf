server {
    listen 80;
    server_name prometheus.hamidbong.tech;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name prometheus.hamidbong.tech;

    # SSL
    ssl_certificate /home/ubuntu/grafana.crt;
    ssl_certificate_key /home/ubuntu/tls.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Limitation globale
    limit_req zone=api_limit burst=20 nodelay;
    limit_conn addr 10;


    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    location / {
        # Limitation spécifique à la racine
        limit_req zone=api_limit burst=30 delay=20;

        proxy_pass https://k8s_ingress_https;
        proxy_ssl_verify off;
        
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Gestion des erreurs de limitation
    error_page 429 /rate_limit_exceeded.html;
    location = /rate_limit_exceeded.html {
        internal;
        root /usr/share/nginx/html;
    }

}
